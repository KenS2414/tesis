<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .box { fill:#f8f9fa; stroke:#333; stroke-width:1; }
    .title { font: bold 14px sans-serif; }
    .col { font: 12px monospace; }
    .fk { stroke:#c00; stroke-width:1.2; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#c00" />
    </marker>
  </defs>

  <!-- user -->
  <g transform="translate(20,20)">
    <rect class="box" width="220" height="90" rx="6"/>
    <text class="title" x="10" y="20">user</text>
    <text class="col" x="10" y="40">id : SERIAL PK</text>
    <text class="col" x="10" y="55">username : VARCHAR(150) UNIQUE</text>
    <text class="col" x="10" y="70">role : VARCHAR(50)</text>
  </g>

  <!-- student -->
  <g transform="translate(270,20)">
    <rect class="box" width="240" height="110" rx="6"/>
    <text class="title" x="10" y="20">student</text>
    <text class="col" x="10" y="40">id : SERIAL PK</text>
    <text class="col" x="10" y="55">first_name : VARCHAR(120)</text>
    <text class="col" x="10" y="70">last_name : VARCHAR(120)</text>
    <text class="col" x="10" y="85">email : VARCHAR(200)</text>
    <text class="col" x="10" y="100">created_at : TIMESTAMP</text>
  </g>

  <!-- subject -->
  <g transform="translate(560,20)">
    <rect class="box" width="220" height="70" rx="6"/>
    <text class="title" x="10" y="20">subject</text>
    <text class="col" x="10" y="40">id : SERIAL PK</text>
    <text class="col" x="10" y="55">name : VARCHAR(200)</text>
  </g>

  <!-- grade -->
  <g transform="translate(270,160)">
    <rect class="box" width="380" height="110" rx="6"/>
    <text class="title" x="10" y="20">grade</text>
    <text class="col" x="10" y="40">id : SERIAL PK</text>
    <text class="col" x="10" y="55">student_id : INTEGER FK → student(id)</text>
    <text class="col" x="10" y="70">subject_id : INTEGER FK → subject(id)</text>
    <text class="col" x="10" y="85">score : NUMERIC(5,2)</text>
    <text class="col" x="10" y="100">created_at : TIMESTAMP</text>
  </g>

  <!-- payment -->
  <g transform="translate(20,160)">
    <rect class="box" width="220" height="110" rx="6"/>
    <text class="title" x="10" y="20">payment</text>
    <text class="col" x="10" y="40">id : SERIAL PK</text>
    <text class="col" x="10" y="55">student_id : INTEGER FK → student(id)</text>
    <text class="col" x="10" y="70">amount : NUMERIC(10,2)</text>
    <text class="col" x="10" y="85">status : VARCHAR(20)</text>
  </g>

  <!-- FK arrows -->
  <line class="fk" x1="390" y1="215" x2="320" y2="165" />
  <line class="fk" x1="520" y1="215" x2="630" y2="85" />
  <line class="fk" x1="180" y1="215" x2="300" y2="165" />

</svg>
