{% extends 'base.html' %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <div class="auth-header text-center">
             <img src="{{ brand_logo_url }}?v={{ ASSET_VERSION }}" alt="La Salle Logo" class="auth-logo mx-auto d-block">
             <h2 class="h4 mt-3">Registro</h2>
             <p class="text-muted">Crea una cuenta para acceder</p>
        </div>

        <form method="post" action="{{ url_for('auth_bp.register') }}" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div class="mb-3">
              <label for="username" class="form-label">Usuario</label>
              <input id="username" name="username" class="form-control" required placeholder="Tu nombre de usuario">
            </div>

            <div class="row g-2 mb-3">
                <div class="col-md-6">
                  <label for="first_name" class="form-label">Nombre</label>
                  <input id="first_name" name="first_name" class="form-control" required placeholder="Tu nombre">
                </div>
                <div class="col-md-6">
                  <label for="last_name" class="form-label">Apellido</label>
                  <input id="last_name" name="last_name" class="form-control" required placeholder="Tu apellido">
                </div>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-md-6">
                  <label for="cedula" class="form-label">Cédula</label>
                  <input id="cedula" name="cedula" class="form-control" required placeholder="Tu cédula" maxlength="8" pattern="\d*" title="Debe contener solo números (hasta 8 dígitos)">
                </div>
                <div class="col-md-6">
                  <label for="dob" class="form-label">Fecha nacimiento</label>
                  <input id="dob" name="dob" type="date" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input id="password" name="password" type="password" class="form-control" required placeholder="Elige una contraseña segura">
            </div>

            <div class="mb-3">
              <label for="confirm_password" class="form-label">Confirmar Contraseña</label>
              <input id="confirm_password" name="confirm_password" type="password" class="form-control" required placeholder="Repite tu contraseña">
            </div>

            <div class="mb-4">
              <label for="photo" class="form-label">Foto de perfil (opcional)</label>
              <input type="file" id="photo" name="photo" class="form-control" accept="image/*" />
            </div>

            <div class="d-grid gap-2 mb-3">
              <button type="submit" class="btn btn-primary btn-lg">Registrarse</button>
            </div>

            <div class="text-center">
              <span class="text-muted small">¿Ya tienes cuenta?</span>
              <a href="{{ url_for('auth_bp.login') }}" style="color: var(--brand-blue); font-weight: 600; text-decoration: none;">Inicia sesión aquí</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
