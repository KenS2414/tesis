{% extends "base.html" %}
{% block title %}Nuevo Año Académico{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Crear Año Académico</h1>
        <form method="POST" action="{{ url_for('system_bp.create_academic_year') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del Año Académico</label>
            <input type="text" id="nombre" name="nombre" class="form-control" required placeholder="Ej: 2023-2024">
          </div>

          <div class="mb-3">
            <label for="fecha_inicio" class="form-label">Fecha de Inicio</label>
            <input type="date" id="fecha_inicio" name="fecha_inicio" class="form-control" required>
          </div>

          <div class="mb-4">
            <label for="fecha_fin" class="form-label">Fecha de Fin</label>
            <input type="date" id="fecha_fin" name="fecha_fin" class="form-control" required>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Crear</button>
            <a href="{{ url_for('system_bp.list_academic_years') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
