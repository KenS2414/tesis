name: MinIO E2E

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  minio-e2e:
    runs-on: ubuntu-latest
    env:
      MINIO_IMAGE: minio/minio:RELEASE.2024-12-13T22-19-12Z
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_REGION: us-east-1
      S3_BUCKET: resis-uploads
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Start MinIO
        run: |
          docker run -d --rm --name minio-e2e \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID} \
            -e MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY} \
            ${MINIO_IMAGE} server /data --console-address ":9001"

      - name: Wait for MinIO
        run: |
          python - <<'PY'
          import socket
          import time

          deadline = time.time() + 60
          while time.time() < deadline:
              sock = socket.socket()
              sock.settimeout(1)
              try:
                  sock.connect(("127.0.0.1", 9000))
                  print("MinIO listo en 127.0.0.1:9000")
                  break
              except OSError:
                  time.sleep(1)
              finally:
                  sock.close()
          else:
              raise SystemExit("MinIO no estuvo disponible en 127.0.0.1:9000")
          PY

      - name: Create S3 bucket
        run: python scripts/create_bucket.py

      - name: Run MinIO integration tests
        run: |
          pytest -q -m integration
