server {
    listen 80;
    server_name _;

    # Development-friendly: serve plain HTTP and proxy to the web app.
    client_max_body_size 10M;

    # serve static files directly
    location /static/ {
        alias /app/static/; # when running in Docker the app is mounted at /app
        expires 30d;
        add_header Cache-Control "public";
    }

    # ACME challenge path for certbot webroot (still available if certs are requested)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://web:8000;
    }
}
